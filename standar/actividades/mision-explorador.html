<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Misión Explorador — Mundo Alimeythor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{ --font:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
  --teal:#2FB4B0; --teal-d:#1E8C89; --orange:#E0792b; --orange-d:#B85C12; --bd:#D9EBEA; --r:16px; --t2:#5a6b6b;}
html,body{height:100%;}
body{font-family:var(--font);background:linear-gradient(180deg,#E6F5F4,#F2FAF9);color:#234;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;user-select:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#app{max-width:520px;margin:0 auto;padding:.8rem 1rem 2rem;position:relative;}
.scene{display:none;animation:fade .35s ease;}
.scene.active{display:flex;flex-direction:column;align-items:center;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
#topbar{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:.5rem;}
#progress{background:#fff;border:2px solid var(--orange);border-radius:999px;padding:5px 14px;font-weight:bold;color:var(--orange-d);font-size:14px;}
#mute{background:#fff;border:2px solid var(--teal);border-radius:50%;width:38px;height:38px;font-size:17px;color:var(--teal-d);cursor:pointer;box-shadow:0 3px 0 rgba(31,140,137,.18);}
#mute:active{transform:translateY(2px);box-shadow:none;}

.page-wrap{position:relative;width:100%;max-width:440px;border-radius:14px;overflow:hidden;box-shadow:0 8px 22px rgba(40,90,90,.18);}
.page-img{width:100%;display:block;}
.page-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair;}

.tools{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:center;margin:10px 0 6px;}
.swatch{width:30px;height:30px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1.5px var(--bd);cursor:pointer;}
.swatch.sel{box-shadow:0 0 0 3px var(--orange);transform:scale(1.12);}
.tool{background:#fff;border:2px solid var(--bd);border-radius:10px;padding:7px 10px;font-size:16px;cursor:pointer;font-family:var(--font);}
.tool.sel{border-color:var(--orange);background:#FFF1D6;}

.navrow{display:flex;gap:8px;width:100%;max-width:440px;margin-top:4px;}
.btn{flex:1;padding:13px;border-radius:13px;border:none;background:var(--teal);color:#fff;font-family:var(--font);font-size:15px;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 var(--teal-d);}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--teal-d);}
.btn.amber{background:var(--orange);box-shadow:0 4px 0 var(--orange-d);}
.btn2{padding:13px;border-radius:13px;border:2px solid var(--bd);background:#fff;color:var(--t2);font-family:var(--font);font-size:15px;cursor:pointer;}
.hint{font-size:12.5px;color:var(--t2);text-align:center;margin-top:.5rem;max-width:30em;}
.confz{position:fixed;z-index:60;pointer-events:none;border-radius:1px;will-change:transform,opacity;}

/* final */
.ali{width:140px;height:auto;filter:drop-shadow(0 8px 12px rgba(40,90,90,.22));}
h2{font-size:22px;color:var(--orange-d);text-align:center;margin:8px 0 4px;}
.sub{font-size:14px;color:var(--t2);text-align:center;line-height:1.55;margin-bottom:1rem;max-width:30em;}

@media (orientation:landscape) and (max-height:560px){
  .page-wrap{max-width:320px;} .ali{width:96px;}
}
</style>
</head>
<body>
<div id="app">
  <button id="mute" onclick="toggleSound()" title="Sonido">🔊</button>

  <!-- PÁGINA (reutilizable) -->
  <div class="scene active" id="s-page">
    <div id="topbar">
      <div id="progress"><span id="pname">Portada</span> · <span id="pidx">1</span>/6</div>
      <div></div>
    </div>
    <div class="page-wrap">
      <img class="page-img" id="page-img" alt="página"/>
      <canvas class="page-canvas" id="draw" width="540" height="766"></canvas>
    </div>
    <div class="tools" id="tools"></div>
    <div class="navrow">
      <button class="btn2" onclick="prevPage()">←</button>
      <button class="btn amber" id="done-btn" onclick="donePage()">🎉 ¡Listo!</button>
      <button class="btn" id="next-btn" onclick="nextPage()">→</button>
    </div>
    <div class="hint" id="hint">Dibujá en la página. Cuando termines, tocá <b>¡Listo!</b> 🎉</div>
  </div>

  <!-- FINAL -->
  <div class="scene" id="s-final">
    <img class="ali" id="ali-final" alt="Alimeythor"/>
    <h2>🏅 ¡Misión Explorador cumplida!</h2>
    <p class="sub">Descubriste la magia escondida en tu propio hogar. ¡Sos un Explorador de Mundos Ocultos! 🌟</p>
    <div class="navrow" style="max-width:360px">
      <button class="btn2" onclick="show('page'); showPage(0);">🔁 Volver a mis páginas</button>
      <button class="btn" onclick="restart()">🆕 De nuevo</button>
    </div>
    <p class="hint">Mundo Alimeythor · ¡Tu imaginación no tiene límites!</p>
  </div>
</div>

/* ===== SONIDO ===== */
let soundOn=true; try{ const m=localStorage.getItem('mision_sound'); soundOn=m===null?true:m==='1'; }catch(e){}
let actx;
function ensureCtx(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function setIcon(){ const b=document.getElementById('mute'); if(b) b.textContent=soundOn?'🔊':'🔇'; }
function toggleSound(){ soundOn=!soundOn; try{ localStorage.setItem('mision_sound', soundOn?'1':'0'); }catch(e){} setIcon(); ensureCtx(); if(!soundOn) scribbleOff(); }
setIcon();
function softTone(f,dur,vol){ if(!soundOn) return; ensureCtx(); if(!actx) return; const t=actx.currentTime;
  const o=actx.createOscillator(),g=actx.createGain(),lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800;
  o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(lp); lp.connect(actx.destination);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||0.12,t+0.04); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.start(t); o.stop(t+dur+0.03); }
function softChime(){ [523.25,659.25,783.99].forEach((f,i)=> setTimeout(()=>softTone(f,0.7,0.12), i*140)); }

/* sonido suave de lápiz mientras dibuja */
let scribSrc=null, scribGain=null, noiseBuf=null;
function makeNoise(){ if(noiseBuf||!actx) return; const len=Math.floor(actx.sampleRate*1.5);
  noiseBuf=actx.createBuffer(1,len,actx.sampleRate); const d=noiseBuf.getChannelData(0); let lp=0;
  for(let i=0;i<len;i++){ const w=Math.random()*2-1; lp=lp*0.96+w*0.04; d[i]=lp*3.2; } }
function scribbleOn(){ if(!soundOn) return; ensureCtx(); if(!actx||scribSrc) return; makeNoise();
  scribSrc=actx.createBufferSource(); scribSrc.buffer=noiseBuf; scribSrc.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=0.6;
  scribGain=actx.createGain(); scribGain.gain.value=0; scribSrc.connect(bp); bp.connect(scribGain); scribGain.connect(actx.destination);
  scribSrc.start(); scribGain.gain.linearRampToValueAtTime(0.05, actx.currentTime+0.05); }
function scribbleOff(){ try{ if(scribGain) scribGain.gain.linearRampToValueAtTime(0, actx.currentTime+0.08);
  if(scribSrc){ const s=scribSrc; setTimeout(()=>{try{s.stop();}catch(e){}},130); } }catch(e){} scribSrc=null; scribGain=null; }

/* ===== DIBUJO ===== */
const COLORS=['#E0792b','#E24B4A','#F4C95D','#2FB4B0','#5BC0EB','#7C5CD6','#1D9E75','#000000'];
let color=COLORS[0], size=6, eraser=false;
const drawings={}, undoStacks={};
let pageIndex=0, drawing=false, last=null;
const cv=document.getElementById('draw'), ctx=cv.getContext('2d');
function buildTools(){
  const c=document.getElementById('tools'); c.innerHTML='';
  COLORS.forEach(col=>{ const s=document.createElement('div'); s.className='swatch'+(col===color&&!eraser?' sel':''); s.style.background=col;
    s.onclick=()=>{ color=col; eraser=false; buildTools(); }; c.appendChild(s); });
  [['•',4],['●',8],['⬤',14]].forEach(([lbl,sz])=>{ const d=document.createElement('div'); d.className='tool'+(size===sz&&!eraser?' sel':''); d.textContent=lbl; d.style.fontSize=(10+sz)+'px';
    d.onclick=()=>{ size=sz; eraser=false; buildTools(); }; c.appendChild(d); });
  const er=document.createElement('div'); er.className='tool'+(eraser?' sel':''); er.textContent='🧽'; er.onclick=()=>{ eraser=!eraser; buildTools(); }; c.appendChild(er);
  const un=document.createElement('div'); un.className='tool'; un.textContent='↩️'; un.onclick=undo; c.appendChild(un);
  const cl=document.createElement('div'); cl.className='tool'; cl.textContent='🗑️'; cl.onclick=clearDraw; c.appendChild(cl);
}
function ptBuf(e){ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)}; }
function pushUndo(){ const st=undoStacks[pageIndex]=undoStacks[pageIndex]||[]; st.push(cv.toDataURL()); if(st.length>12) st.shift(); }
function dStart(e){ pushUndo(); drawing=true; last=ptBuf(e); scribbleOn();
  ctx.fillStyle=eraser?'rgba(0,0,0,1)':color;
  ctx.globalCompositeOperation = eraser?'destination-out':'source-over';
  ctx.beginPath(); ctx.arc(last.x,last.y,(eraser?size*2:size)/2,0,Math.PI*2); ctx.fill();
  if(e.cancelable)e.preventDefault(); }
function dMove(e){ if(!drawing) return; const p=ptBuf(e);
  ctx.globalCompositeOperation = eraser?'destination-out':'source-over';
  ctx.strokeStyle=color; ctx.lineWidth=eraser?size*4:size; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; if(e.cancelable)e.preventDefault(); }
function dEnd(){ if(drawing){ drawing=false; scribbleOff(); saveCurrent(); } }
cv.addEventListener('pointerdown',dStart); cv.addEventListener('pointermove',dMove); window.addEventListener('pointerup',dEnd);
cv.addEventListener('touchstart',dStart,{passive:false}); cv.addEventListener('touchmove',dMove,{passive:false}); window.addEventListener('touchend',dEnd);
function saveCurrent(){ drawings[pageIndex]=cv.toDataURL(); }
function loadCanvas(i){ ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,cv.width,cv.height);
  const data=drawings[i]; if(data){ const im=new Image(); im.onload=()=>ctx.drawImage(im,0,0,cv.width,cv.height); im.src=data; } }
function undo(){ const st=undoStacks[pageIndex]; if(st&&st.length){ const d=st.pop(); const im=new Image();
  im.onload=()=>{ ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,cv.width,cv.height); ctx.drawImage(im,0,0,cv.width,cv.height); saveCurrent(); }; im.src=d; } }
function clearDraw(){ pushUndo(); ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,cv.width,cv.height); saveCurrent(); }

/* ===== PÁGINAS ===== */
function showPage(i){ pageIndex=i; const p=PAGES[i];
  document.getElementById('page-img').src=PAGES_IMG[p.key];
  document.getElementById('pname').textContent=p.name;
  document.getElementById('pidx').textContent=(i+1);
  document.getElementById('next-btn').textContent=(i===PAGES.length-1)?'🏅':'→';
  loadCanvas(i);
}
function nextPage(){ saveCurrent(); if(pageIndex<PAGES.length-1) showPage(pageIndex+1); else finishAll(); }
function prevPage(){ saveCurrent(); if(pageIndex>0) showPage(pageIndex-1); }
function donePage(){ confetti(); softChime();
  if(pageIndex<PAGES.length-1){ setTimeout(()=>{ saveCurrent(); showPage(pageIndex+1); }, 900); }
  else { setTimeout(finishAll, 900); } }
function finishAll(){ show('final'); confetti(); softChime(); }
function restart(){ for(const k in drawings) delete drawings[k]; for(const k in undoStacks) delete undoStacks[k];
  show('page'); showPage(0); }

/* ===== PAPELITOS ===== */
function confetti(){ const cols=['#FFD400','#E0792b','#2FB4B0','#FF6D8B','#5BC0EB','#7C5CD6','#1D9E75','#FF8A65'];
  for(let i=0;i<46;i++){ const p=document.createElement('div'); p.className='confz';
    const w=6+Math.random()*7; p.style.width=w+'px'; p.style.height=(w*0.6)+'px'; p.style.background=cols[i%cols.length];
    p.style.left=(50+(Math.random()*40-20))+'%'; p.style.top='40%'; document.body.appendChild(p);
    const dx=(Math.random()*2-1)*window.innerWidth*0.42, dy=window.innerHeight*0.55+Math.random()*220, rot=Math.random()*900-450, dur=1800+Math.random()*1500;
    p.animate([{transform:'translate(0,0) rotate(0)',opacity:1},
      {transform:'translate('+(dx*.35)+'px,'+(-50-Math.random()*70)+'px) rotate('+rot*.3+'deg)',opacity:1,offset:.22},
      {transform:'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)',opacity:0}],{duration:dur,easing:'cubic-bezier(.2,.55,.4,1)'});
    setTimeout(()=>p.remove(),dur+60);
  }
}
buildTools(); showPage(0);
</script>
