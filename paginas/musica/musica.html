<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Música — Alimeythor</title>
  <link rel="icon" href="../../favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh;
      overflow: hidden;
    }
    body {
      font-family: 'Poppins', sans-serif;
      color: #1a1a2e;
      background: linear-gradient(180deg, #e6f4ff 0%, #fff5f5 100%);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* Decoración: notas y estrellas flotando suaves */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 8% 18%, rgba(51,175,237,0.18) 0 6px, transparent 8px),
        radial-gradient(circle at 92% 30%, rgba(237,28,185,0.14) 0 5px, transparent 7px),
        radial-gradient(circle at 12% 78%, rgba(248,160,10,0.16) 0 5px, transparent 7px),
        radial-gradient(circle at 88% 82%, rgba(63,180,17,0.14) 0 5px, transparent 7px),
        radial-gradient(circle at 50% 5%, rgba(232,237,11,0.18) 0 4px, transparent 6px);
    }

    h1, h2, h3, h4, .btn, .player-title, .pl-title { font-family: 'Chewy', 'Poppins', sans-serif; letter-spacing: 0.5px; }

    /* ============= BACK BAR ============= */
    .back-bar {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 50;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: #f8231c;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(248,35,28,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }
    .back-btn--ghost {
      background: #fff;
      color: #f8231c;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
    }
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(248,35,28,0.45);
    }

    /* ============= WRAP — fullscreen sin scroll global ============= */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 78px clamp(20px, 2vw, 32px) clamp(16px, 2vh, 28px);
      height: 100vh;
      display: flex;
      flex-direction: column;
      text-align: center;
    }
    .wrap-header { flex-shrink: 0; }
    .eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1572a8;
      background: rgba(51,175,237,0.12);
      padding: 5px 14px;
      border-radius: 999px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: 'Poppins', sans-serif;
    }
    h1 {
      font-size: clamp(26px, 3.4vw, 44px);
      font-weight: 400;
      line-height: 1.08;
      margin-bottom: 6px;
    }
    h1 .accent { color: #33afed; }
    .sub {
      font-size: clamp(13px, 0.95vw, 16px);
      color: #6a6a82;
      max-width: 620px;
      margin: 0 auto clamp(16px, 2.4vh, 28px);
      line-height: 1.5;
    }

    /* ============= LAYOUT REPRODUCTOR + PLAYLIST ============= */
    .music-grid {
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: clamp(18px, 2vw, 28px);
      align-items: stretch;
      text-align: left;
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 880px) {
      /* En celular/tablet la página scrollea normal para ver TODAS las canciones */
      html, body { height: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .wrap { height: auto; min-height: 100vh; }
      .music-grid { grid-template-columns: 1fr; overflow: visible; align-items: start; }
      .playlist { overflow: visible; }
      #pl-list { overflow: visible; flex: none; min-height: 0; }
      /* Controles más fáciles de tocar/arrastrar en celular */
      .player-progress { height: 12px !important; }
      .player-progress-knob { width: 20px !important; height: 20px !important; }
      .vol-bar { height: 12px; }
      .vol-knob { width: 22px; height: 22px; }
    }

    /* ============= NOW PLAYING CARD ============= */
    .player {
      background: linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.86)), url('../../inicio/checkrepro.png') center/cover no-repeat;
      border: 1.5px solid rgba(248,35,28,0.14);
      border-radius: 24px;
      padding: clamp(18px, 2.5vh, 28px) clamp(18px, 2vw, 26px);
      box-shadow:
        0 10px 0 rgba(248,35,28,0.22),
        0 22px 40px rgba(248,35,28,0.16),
        0 4px 12px rgba(0,0,0,0.06);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .player-cover {
      width: clamp(120px, 18vh, 180px);
      height: clamp(120px, 18vh, 180px);
      margin: 0 auto clamp(10px, 1.6vh, 16px);
      border-radius: 28px;
      background: linear-gradient(135deg, #33afed 0%, #ed1cb9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(58px, 8vh, 86px);
      box-shadow: 0 12px 28px rgba(51,175,237,0.35), 0 5px 0 rgba(0,0,0,0.08);
      transition: transform 0.4s cubic-bezier(.2,.8,.2,1);
      flex-shrink: 0;
    }
    .player.is-playing .player-cover {
      animation: coverFloat 4s ease-in-out infinite;
    }
    @keyframes coverFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-8px) rotate(2deg); }
    }
    .player-title {
      font-size: clamp(16px, 2.2vh, 20px);
      font-weight: 400;
      color: #1a1a2e;
      margin-bottom: 2px;
      min-height: 24px;
    }
    .player-subtitle {
      font-size: 12px;
      color: #6a6a82;
      margin-bottom: clamp(12px, 1.8vh, 18px);
    }

    /* Barra de progreso */
    .player-progress {
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      margin-bottom: 8px;
      touch-action: none;            /* arrastrar para buscar sin scrollear la página */
    }
    .player-progress-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: linear-gradient(90deg, #33afed, #ed1cb9);
      border-radius: 999px;
      width: 0%;
      transition: width 0.15s linear;
    }
    .player-progress-knob {
      position: absolute;
      top: 50%;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      pointer-events: none;
    }
    .player-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6a6a82;
      font-variant-numeric: tabular-nums;
      margin-bottom: clamp(12px, 1.8vh, 18px);
    }

    /* Controles */
    .player-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(10px, 1.6vh, 16px);
    }
    .ctrl {
      background: #fff;
      border: 2px solid rgba(0,0,0,0.06);
      width: clamp(38px, 5vh, 44px); height: clamp(38px, 5vh, 44px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      color: #1a1a2e;
      font-size: 16px;
    }
    .ctrl:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.10); }
    .ctrl--play {
      width: clamp(52px, 7vh, 60px); height: clamp(52px, 7vh, 60px);
      background: linear-gradient(135deg, #f8231c, #ed1cb9);
      color: #fff;
      border: none;
      font-size: 22px;
      box-shadow: 0 7px 0 #8C1010, 0 12px 22px rgba(248,35,28,0.30);
    }
    .ctrl--play:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #8C1010, 0 18px 28px rgba(248,35,28,0.40); }
    /* Íconos SVG (no emojis) — se ven limpios y el botón play queda siempre rojo */
    .ctrl svg { width: 20px; height: 20px; fill: currentColor; pointer-events: none; display: block; }
    .ctrl--play svg { width: 24px; height: 24px; }

    /* Volumen — barra propia arrastrable (responde al toque) */
    .player-volume {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 220px;
      margin: 0 auto;
    }
    .vol-bar {
      flex: 1;
      height: 8px;
      background: rgba(0,0,0,0.10);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      touch-action: none;            /* arrastrar sin scrollear */
    }
    .vol-fill {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: 80%;
      background: linear-gradient(90deg, #33afed, #ed1cb9);
      border-radius: 999px;
    }
    .vol-knob {
      position: absolute; top: 50%; left: 80%;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    .player-volume span { font-size: 16px; color: #6a6a82; }

    /* ============= PLAYLIST ============= */
    .playlist {
      background: linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.86)), url('../../inicio/checrepro1.png') center/cover no-repeat;
      border: 1.5px solid rgba(248,35,28,0.14);
      border-radius: 24px;
      padding: clamp(16px, 2vh, 22px) clamp(16px, 2vw, 22px);
      box-shadow:
        0 10px 0 rgba(248,35,28,0.22),
        0 22px 40px rgba(248,35,28,0.16),
        0 4px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .pl-title {
      font-size: clamp(18px, 2.4vh, 22px);
      font-weight: 400;
      margin-bottom: 2px;
      color: #1a1a2e;
      flex-shrink: 0;
    }
    .pl-meta {
      font-size: 11px;
      color: #6a6a82;
      margin-bottom: clamp(8px, 1.4vh, 14px);
      font-weight: 600;
      flex-shrink: 0;
    }
    #pl-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }
    .pl-item {
      display: grid;
      grid-template-columns: 38px 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      transition: background 0.2s ease, transform 0.2s ease;
      cursor: pointer;
      border: 1.5px solid transparent;
      margin-bottom: 4px;
    }
    .pl-item:hover {
      background: rgba(51,175,237,0.08);
      border-color: rgba(51,175,237,0.20);
    }
    .pl-item.is-active {
      background: rgba(51,175,237,0.14);
      border-color: rgba(51,175,237,0.40);
    }
    .pl-item.is-active .pl-num {
      background: linear-gradient(135deg, #33afed, #ed1cb9);
      color: #fff;
    }
    .pl-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .pl-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .pl-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pl-emoji { font-size: 22px; flex-shrink: 0; }
    .pl-dur {
      font-size: 12px;
      color: #6a6a82;
      font-variant-numeric: tabular-nums;
      padding: 0 8px;
    }
    .pl-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pl-btn {
      width: 32px; height: 32px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.15s ease;
      color: #6a6a82;
    }
    .pl-btn:hover { background: rgba(0,0,0,0.06); transform: scale(1.1); }
    .pl-btn.is-fav { color: #f8231c; }
    .pl-btn.is-watched { color: #3fb411; }

    .empty-note {
      text-align: center;
      color: #6a6a82;
      padding: 24px;
      font-style: italic;
      font-size: 13px;
    }
  
    /* ===== v5-theme-patch: bosque + cielo titilante + entrada ===== */
    body { background: #fff8f5 !important; }
    .bg-video { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; pointer-events: none; }
    .bg-veil { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(255,250,247,0.82) 0%, rgba(255,248,245,0.72) 50%, rgba(255,250,247,0.85) 100%); z-index: -1; pointer-events: none; }
    .twinkle { position: fixed; width: 5px; height: 5px; z-index: 0; pointer-events: none; border-radius: 50%; background: radial-gradient(circle, rgba(255,250,210,0.9) 0%, rgba(248,160,10,0.35) 60%, transparent 75%); animation: twinkleV5 3.2s ease-in-out infinite; }
    @keyframes twinkleV5 { 0%,100% { opacity: 0.12; transform: scale(0.7); } 50% { opacity: 0.55; transform: scale(1.15); } }
    .wrap { animation: pageInV5 0.7s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes pageInV5 { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  
  </style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true"><source src="../../fondo.mp4" type="video/mp4" /></video>
<div class="bg-veil" aria-hidden="true"></div>


  <div class="back-bar">
    <a href="../../index.html" class="back-btn" onclick="try{sessionStorage.setItem('alm_return','explorar');}catch(e){}">← Volver a Alimeythor</a>
  </div>

  <div class="wrap">
    <div class="wrap-header">
      <span class="eyebrow">Música</span>
      <h1>Banda sonora de <span class="accent">Alimeythor</span></h1>
      <p class="sub">Una playlist pensada para acompañar cada momento del día en familia.</p>
    </div>

    <div class="music-grid">

      <!-- ============= NOW PLAYING ============= -->
      <div class="player" id="player">
        <div class="player-cover" id="player-cover">🎵</div>
        <div class="player-title" id="player-title">Elegí una canción</div>
        <div class="player-subtitle" id="player-subtitle">Mundo Alimeythor</div>

        <div class="player-progress" id="player-progress">
          <div class="player-progress-fill" id="player-fill"></div>
          <div class="player-progress-knob" id="player-knob" style="left:0%"></div>
        </div>
        <div class="player-times">
          <span id="player-current">0:00</span>
          <span id="player-total">0:00</span>
        </div>

        <div class="player-controls">
          <button class="ctrl" id="ctrl-prev" aria-label="Anterior"><svg viewBox="0 0 24 24"><path d="M7 5h2.2v14H7zM20 5v14l-9.5-7z"/></svg></button>
          <button class="ctrl ctrl--play" id="ctrl-play" aria-label="Reproducir"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
          <button class="ctrl" id="ctrl-next" aria-label="Siguiente"><svg viewBox="0 0 24 24"><path d="M14.8 5H17v14h-2.2zM4 5v14l9.5-7z"/></svg></button>
        </div>

        <div class="player-volume">
          <span>🔈</span>
          <div class="vol-bar" id="vol-bar">
            <div class="vol-fill" id="vol-fill"></div>
            <div class="vol-knob" id="vol-knob"></div>
          </div>
          <span>🔊</span>
        </div>

        <audio id="audio" preload="metadata"></audio>
      </div>

      <!-- ============= PLAYLIST ============= -->
      <div class="playlist">
        <div class="pl-title">Playlist</div>
        <div class="pl-meta" id="pl-meta">10 canciones</div>
        <div id="pl-list">
          <!-- Las canciones se renderean por JS -->
        </div>
      </div>

    </div>
  </div>

  <script>
    // ============================================================
    // LISTA DE CANCIONES — agregar/modificar acá cuando tengas los links
    // Estructura: { id, emoji, title, src, duration }
    //   - src: URL del MP3/WAV directo. Si vas a usar YouTube,
    //          avisame y migramos a embeds.
    //   - duration: string "M:SS" (opcional; si tiene src real, se lee del audio)
    // ============================================================
    const SONGS = [
      { id: 10, emoji: '💛', title: 'Bienvenidos todos, abran bien el corazón', src: '../../audio/bienvenidos-todos.mp3',     duration: '0:00' },
      { id: 2, emoji: '🪄', title: 'Dónde está la magia',         src: '../../audio/02-donde-esta-la-magia.mp3',         duration: '0:00' },
      { id: 3, emoji: '🤗', title: 'Siempre me vas a tener',      src: '../../audio/03-siempre-me-vas-a-tener.mp3',      duration: '0:00' },
      { id: 4, emoji: '🛡️', title: 'Parte del escuadrón',         src: '../../audio/04-parte-del-escuadron.mp3',         duration: '0:00' },
      { id: 5, emoji: '🤐', title: 'Guardo mis palabras',         src: '../../audio/05-guardo-mis-palabras.mp3',         duration: '0:00' },
      { id: 6, emoji: '👂', title: 'Escuchamos juntos',           src: '../../audio/06-escuchamos-juntos.mp3',           duration: '0:00' },
      { id: 7, emoji: '🎧', title: 'Enseñame a escuchar',         src: '../../audio/07-ensename-a-escuchar.mp3',         duration: '0:00' },
      { id: 8, emoji: '🫧', title: 'Malvavisco mágico, eres así', src: '../../audio/08-malvavisco-magico.mp3',           duration: '0:00' },
      { id: 9, emoji: '🌅', title: 'Despertar al mundo',          src: '../../audio/09-despertar-al-mundo.mp3',          duration: '0:00' },
      { id: 11, emoji: '🪇', title: 'Cumbia: lánzate a la vida',  src: '../../audio/cumbia-lanzate-a-la-vida.mp3',       duration: '0:00' }
    ];

    // ============================================================
    // STATE + STORAGE
    // ============================================================
    const STORAGE = { fav: 'alm_music_fav', watched: 'alm_music_watched' };
    const getSet = (key) => {
      try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); } catch (e) { return new Set(); }
    };
    const saveSet = (key, set) => {
      try { localStorage.setItem(key, JSON.stringify([...set])); } catch (e) {}
    };
    const favs    = getSet(STORAGE.fav);
    const watched = getSet(STORAGE.watched);

    let currentIndex = -1;

    // ============================================================
    // DOM
    // ============================================================
    const audio       = document.getElementById('audio');
    const playerEl    = document.getElementById('player');
    const coverEl     = document.getElementById('player-cover');
    const titleEl     = document.getElementById('player-title');
    const subtitleEl  = document.getElementById('player-subtitle');
    const fillEl      = document.getElementById('player-fill');
    const knobEl      = document.getElementById('player-knob');
    const curTimeEl   = document.getElementById('player-current');
    const totTimeEl   = document.getElementById('player-total');
    const progressEl  = document.getElementById('player-progress');
    const btnPlay     = document.getElementById('ctrl-play');
    const btnPrev     = document.getElementById('ctrl-prev');
    const btnNext     = document.getElementById('ctrl-next');
    const volBar  = document.getElementById('vol-bar');
    const volFill = document.getElementById('vol-fill');
    const volKnob = document.getElementById('vol-knob');

    // Íconos SVG (no emojis) para que el botón play se vea limpio y siempre rojo
    const ICON_PLAY  = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_PAUSE = '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4.2" height="14" rx="1.2"/><rect x="13.8" y="5" width="4.2" height="14" rx="1.2"/></svg>';
    const listEl      = document.getElementById('pl-list');
    const metaEl      = document.getElementById('pl-meta');

    // ============================================================
    // RENDER PLAYLIST
    // ============================================================
    function renderList() {
      listEl.innerHTML = SONGS.map((s, i) => {
        const isActive  = i === currentIndex;
        const isFav     = favs.has(s.id);
        const isWatched = watched.has(s.id);
        return `
          <div class="pl-item ${isActive ? 'is-active' : ''}" data-idx="${i}">
            <div class="pl-num">${i+1}</div>
            <div class="pl-info">
              <div class="pl-name"><span class="pl-emoji">${s.emoji}</span>${s.title}</div>
            </div>
            <div class="pl-dur">${s.duration || '–:–'}</div>
            <div class="pl-actions">
              <button class="pl-btn ${isFav ? 'is-fav' : ''}" data-act="fav" data-idx="${i}" title="Favorita">${isFav ? '❤️' : '🤍'}</button>
              <button class="pl-btn ${isWatched ? 'is-watched' : ''}" data-act="watched" data-idx="${i}" title="Escuchada">${isWatched ? '✅' : '⬜'}</button>
            </div>
          </div>
        `;
      }).join('');
      metaEl.textContent = `${SONGS.length} canciones · ${favs.size} favoritas · ${watched.size} escuchadas`;
    }

    // ============================================================
    // PLAYER
    // ============================================================
    function loadSong(i) {
      currentIndex = i;
      const s = SONGS[i];
      titleEl.textContent = s.title;
      coverEl.textContent = s.emoji;
      subtitleEl.textContent = 'Mundo Alimeythor';
      if (s.src) {
        audio.src = s.src;
        audio.load();
      } else {
        audio.removeAttribute('src');
        totTimeEl.textContent = s.duration || '0:00';
        curTimeEl.textContent = '0:00';
        fillEl.style.width = '0%';
        knobEl.style.left = '0%';
      }
      renderList();
    }

    function play() {
      if (!audio.src) {
        // Si no hay src real, simulamos un placeholder visual
        playerEl.classList.add('is-playing');
        btnPlay.innerHTML = ICON_PAUSE;
        return;
      }
      audio.play().then(() => {
        playerEl.classList.add('is-playing');
        btnPlay.innerHTML = ICON_PAUSE;
      }).catch(() => {});
    }
    function pause() {
      audio.pause();
      playerEl.classList.remove('is-playing');
      btnPlay.innerHTML = ICON_PLAY;
    }
    function togglePlay() {
      if (currentIndex < 0) loadSong(0);
      if (audio.paused) play();
      else pause();
    }
    function prev() {
      if (currentIndex <= 0) loadSong(SONGS.length - 1);
      else loadSong(currentIndex - 1);
      play();
    }
    function next() {
      if (currentIndex >= SONGS.length - 1) loadSong(0);
      else loadSong(currentIndex + 1);
      play();
    }

    btnPlay.addEventListener('click', togglePlay);
    btnPrev.addEventListener('click', prev);
    btnNext.addEventListener('click', next);

    // Volumen: barra propia arrastrable (toque y mouse)
    function setVolFromX(clientX) {
      const rect = volBar.getBoundingClientRect();
      let pct = (clientX - rect.left) / rect.width;
      pct = Math.max(0, Math.min(1, pct));
      audio.volume = pct;
      volFill.style.width = (pct * 100) + '%';
      volKnob.style.left  = (pct * 100) + '%';
    }
    let volDrag = false;
    volBar.addEventListener('pointerdown', (e) => {
      volDrag = true;
      try { volBar.setPointerCapture(e.pointerId); } catch (x) {}
      setVolFromX(e.clientX);
      e.preventDefault();
    });
    volBar.addEventListener('pointermove', (e) => { if (volDrag) setVolFromX(e.clientX); });
    volBar.addEventListener('pointerup',   () => { volDrag = false; });
    volBar.addEventListener('pointercancel', () => { volDrag = false; });
    audio.volume = 0.8;

    // Progreso
    audio.addEventListener('loadedmetadata', () => {
      totTimeEl.textContent = fmt(audio.duration);
      // Refrescar duración en la lista
      if (currentIndex >= 0) {
        SONGS[currentIndex].duration = fmt(audio.duration);
        renderList();
      }
    });
    audio.addEventListener('timeupdate', () => {
      if (!isFinite(audio.duration)) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      fillEl.style.width = pct + '%';
      knobEl.style.left = pct + '%';
      curTimeEl.textContent = fmt(audio.currentTime);
    });
    audio.addEventListener('ended', () => {
      // Marcar como escuchada automáticamente
      watched.add(SONGS[currentIndex].id);
      saveSet(STORAGE.watched, watched);
      // Pasar a la siguiente
      next();
    });
    audio.addEventListener('error', () => {
      subtitleEl.textContent = 'No se pudo cargar el audio · revisá el enlace';
      playerEl.classList.remove('is-playing');
      btnPlay.innerHTML = ICON_PLAY;
    });
    audio.addEventListener('waiting', () => {
      subtitleEl.textContent = 'Cargando…';
    });
    audio.addEventListener('playing', () => {
      subtitleEl.textContent = 'Mundo Alimeythor';
    });

    // Barra de progreso: arrastrable para elegir el minuto (toque y mouse)
    let seeking = false;
    function seekFromX(clientX) {
      if (!isFinite(audio.duration) || audio.duration <= 0) return;
      const rect = progressEl.getBoundingClientRect();
      let pct = (clientX - rect.left) / rect.width;
      pct = Math.max(0, Math.min(1, pct));
      audio.currentTime = pct * audio.duration;
      fillEl.style.width = (pct * 100) + '%';
      knobEl.style.left = (pct * 100) + '%';
      curTimeEl.textContent = fmt(pct * audio.duration);
    }
    progressEl.addEventListener('pointerdown', (e) => {
      seeking = true;
      try { progressEl.setPointerCapture(e.pointerId); } catch (err) {}
      seekFromX(e.clientX);
      e.preventDefault();
    });
    progressEl.addEventListener('pointermove', (e) => { if (seeking) seekFromX(e.clientX); });
    progressEl.addEventListener('pointerup',   () => { seeking = false; });
    progressEl.addEventListener('pointercancel', () => { seeking = false; });

    // Click en items + acciones
    listEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.pl-btn');
      if (btn) {
        e.stopPropagation();
        const idx = +btn.dataset.idx;
        const act = btn.dataset.act;
        const id  = SONGS[idx].id;
        if (act === 'fav') {
          favs.has(id) ? favs.delete(id) : favs.add(id);
          saveSet(STORAGE.fav, favs);
        } else if (act === 'watched') {
          watched.has(id) ? watched.delete(id) : watched.add(id);
          saveSet(STORAGE.watched, watched);
        }
        renderList();
        return;
      }
      const item = e.target.closest('.pl-item');
      if (item) {
        const idx = +item.dataset.idx;
        loadSong(idx);
        play();
      }
    });

    function fmt(seconds) {
      if (!isFinite(seconds)) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + (s < 10 ? '0' + s : s);
    }

    // Init
    renderList();
  </script>

<script>
(function(){ var S=[[6,14],[16,64],[9,86],[26,32],[38,78],[60,22],[72,66],[84,12],[90,48],[94,84]]; S.forEach(function(p,i){ var t=document.createElement('div'); t.className='twinkle'; t.style.left=p[0]+'vw'; t.style.top=p[1]+'vh'; t.style.animationDelay=(i*0.42)+'s'; t.style.animationDuration=(2.6+(i%4)*0.5)+'s'; document.body.appendChild(t); }); })();
</script>
</body>
