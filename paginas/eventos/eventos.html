<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos — Alimeythor</title>
  <link rel="icon" href="../../favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      color: #1a1a2e;
      background: linear-gradient(180deg, #fff5f5 0%, #ffeae0 50%, #e6f4ff 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    h1, h2, .tab-btn { font-family: 'Chewy', 'Poppins', sans-serif; letter-spacing: 0.5px; }

    /* Decoración: confeti suave */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 8% 18%, rgba(248,160,10,0.16) 0 5px, transparent 7px),
        radial-gradient(circle at 92% 30%, rgba(237,28,185,0.14) 0 5px, transparent 7px),
        radial-gradient(circle at 12% 78%, rgba(63,180,17,0.14) 0 5px, transparent 7px),
        radial-gradient(circle at 88% 82%, rgba(51,175,237,0.16) 0 5px, transparent 7px),
        radial-gradient(circle at 50% 5%, rgba(232,237,11,0.18) 0 4px, transparent 6px);
    }

    /* ============= BACK BAR ============= */
    .back-bar {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 50;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: #f8231c;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(248,35,28,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(248,35,28,0.45); }

    /* ============= WRAP ============= */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 100px 28px 80px;
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #b56e00;
      background: rgba(248,160,10,0.14);
      padding: 6px 16px;
      border-radius: 999px;
      text-transform: uppercase;
      margin-bottom: 18px;
      font-family: 'Poppins', sans-serif;
    }
    h1 {
      font-size: clamp(32px, 4.4vw, 54px);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    h1 .accent { color: #f8a00a; }
    .sub {
      font-size: clamp(15px, 1vw, 18px);
      color: #6a6a82;
      max-width: 640px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    /* ============= TABS ============= */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .tab-btn {
      background: #fff;
      border: 2px solid rgba(0,0,0,0.06);
      color: #1a1a2e;
      padding: 12px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 400;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.06);
    }
    .tab-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.08); }
    .tab-btn.is-active {
      background: linear-gradient(135deg, #f8a00a, #f8231c);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 0 #C42836, 0 12px 22px rgba(248,160,10,0.30);
    }
    .tab-btn .tab-count {
      background: rgba(0,0,0,0.08);
      color: inherit;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      font-family: 'Poppins', sans-serif;
    }
    .tab-btn.is-active .tab-count { background: rgba(255,255,255,0.30); }

    /* ============= GRID DE FOTOS ============= */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 4 / 3;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10), 0 3px 0 rgba(248,160,10,0.10);
      transition: transform 0.3s cubic-bezier(.2,.8,.2,1), box-shadow 0.3s ease;
    }
    .gallery-item:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 18px 36px rgba(248,160,10,0.25), 0 6px 0 rgba(248,160,10,0.18);
      z-index: 2;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.06); }
    .gallery-item::after {
      content: '🔍';
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,0.9);
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .gallery-item:hover::after { opacity: 1; transform: scale(1); }

    /* ============= LIGHTBOX ============= */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
    }
    .lightbox.is-open { display: flex; }
    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      animation: lbIn 0.3s ease-out;
    }
    @keyframes lbIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .lb-btn {
      position: absolute;
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.30); transform: scale(1.1); }
    .lb-close { top: 24px; right: 24px; }
    .lb-prev { left: 24px; top: 50%; transform: translateY(-50%); }
    .lb-next { right: 24px; top: 50%; transform: translateY(-50%); }
    .lb-prev:hover, .lb-next:hover { transform: translateY(-50%) scale(1.1); }

    .lb-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      padding: 8px 18px;
      border-radius: 999px;
      letter-spacing: 0.5px;
    }

    .empty-gallery {
      text-align: center;
      color: #6a6a82;
      padding: 60px 20px;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .lightbox { padding: 50px 16px; }
      .lb-close { top: 12px; right: 12px; }
      .lb-prev { left: 8px; }
      .lb-next { right: 8px; }
      .lb-btn { width: 44px; height: 44px; font-size: 20px; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .tab-btn { font-size: 13px; padding: 10px 16px; }
    }
  </style>
</head>
<body>

  <div class="back-bar">
    <a href="../../index.html" class="back-btn" onclick="try{sessionStorage.setItem('alm_return','comunidad');}catch(e){}">← Volver a Alimeythor</a>
  </div>

  <div class="wrap">
    <span class="eyebrow">Eventos</span>
    <h1>Mundo Alimeythor en <span class="accent">acción</span></h1>
    <p class="sub">Un recorrido por encuentros, presentaciones, escuelas y radios. Cada foto cuenta una historia compartida con familias y comunidades.</p>

    <div class="tabs" role="tablist">
      <!-- Tabs se renderean por JS -->
    </div>

    <div class="gallery" id="gallery">
      <!-- Fotos se renderean por JS -->
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visor de imagen">
    <button class="lb-btn lb-close" id="lb-close" aria-label="Cerrar">✕</button>
    <button class="lb-btn lb-prev" id="lb-prev" aria-label="Anterior">‹</button>
    <button class="lb-btn lb-next" id="lb-next" aria-label="Siguiente">›</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <div class="lb-counter" id="lb-counter">1 / 1</div>
  </div>

  <script>
    // ============================================================
    // DATOS — 5 secciones con sus fotos
    // ============================================================
    const SECTIONS = [
      { id: 'fotos',          label: 'Fotos',          emoji: '📸', count: 4,
        images: Array.from({length: 4},  (_, i) => `../../evento/fotos-${String(i+1).padStart(2,'0')}.jpeg`) },
      { id: 'presentaciones', label: 'Presentaciones', emoji: '🎤', count: 17,
        images: Array.from({length: 17}, (_, i) => `../../evento/presentaciones-${String(i+1).padStart(2,'0')}.jpeg`) },
      { id: 'radio',          label: 'Radio',          emoji: '🎙️', count: 4,
        images: Array.from({length: 4},  (_, i) => `../../evento/radio-${String(i+1).padStart(2,'0')}.jpeg`) },
      { id: 'feria',          label: 'Feria del libro', emoji: '📚', count: 2,
        images: Array.from({length: 2},  (_, i) => `../../evento/feria-${String(i+1).padStart(2,'0')}.jpeg`) },
      { id: 'jardines',       label: 'Jardines',       emoji: '🌻', count: 3,
        images: Array.from({length: 3},  (_, i) => `../../evento/jardines-${String(i+1).padStart(2,'0')}.jpeg`) }
    ];

    let activeSection = 0;
    let activeImage = 0;

    // ============================================================
    // DOM
    // ============================================================
    const tabsEl    = document.querySelector('.tabs');
    const galleryEl = document.getElementById('gallery');
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');

    // ============================================================
    // RENDER TABS
    // ============================================================
    function renderTabs() {
      tabsEl.innerHTML = SECTIONS.map((s, i) => `
        <button class="tab-btn ${i === activeSection ? 'is-active' : ''}" data-idx="${i}" role="tab" aria-selected="${i === activeSection}">
          <span>${s.emoji}</span>
          <span>${s.label}</span>
          <span class="tab-count">${s.count}</span>
        </button>
      `).join('');
    }

    // ============================================================
    // RENDER GALLERY
    // ============================================================
    function renderGallery() {
      const s = SECTIONS[activeSection];
      if (!s.images.length) {
        galleryEl.innerHTML = '<div class="empty-gallery">Pronto vamos a subir fotos de esta sección 📷</div>';
        return;
      }
      galleryEl.innerHTML = s.images.map((src, i) => `
        <div class="gallery-item" data-idx="${i}">
          <img src="${src}" alt="${s.label} — foto ${i+1}" loading="lazy">
        </div>
      `).join('');
    }

    // ============================================================
    // EVENTS
    // ============================================================
    tabsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      activeSection = +btn.dataset.idx;
      renderTabs();
      renderGallery();
      // scroll al inicio de la galería
      galleryEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    galleryEl.addEventListener('click', (e) => {
      const item = e.target.closest('.gallery-item');
      if (!item) return;
      activeImage = +item.dataset.idx;
      openLightbox();
    });

    function openLightbox() {
      const s = SECTIONS[activeSection];
      lbImg.src = s.images[activeImage];
      lbImg.alt = `${s.label} — foto ${activeImage + 1}`;
      lbCounter.textContent = `${activeImage + 1} / ${s.images.length}`;
      lightbox.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('is-open');
      document.body.style.overflow = '';
    }
    function prevImage() {
      const s = SECTIONS[activeSection];
      activeImage = (activeImage - 1 + s.images.length) % s.images.length;
      openLightbox();
    }
    function nextImage() {
      const s = SECTIONS[activeSection];
      activeImage = (activeImage + 1) % s.images.length;
      openLightbox();
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
    document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('is-open')) return;
      if (e.key === 'Escape')     closeLightbox();
      else if (e.key === 'ArrowLeft')  prevImage();
      else if (e.key === 'ArrowRight') nextImage();
    });

    // Init
    renderTabs();
    renderGallery();
  </script>
</body>
</html>
