<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentos — Alimeythor</title>
  <link rel="icon" href="../../favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Poppins', sans-serif;
      color: #1a1a2e;
      background: #fff8f5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    h1, h2, .back-btn, .ck-title { font-family: 'Chewy', 'Poppins', sans-serif; letter-spacing: 0.5px; font-weight: 400; }

    /* ===== Fondo suave Alimeythor (bosque + velo claro) ===== */
    .bg-video { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; pointer-events: none; }
    .bg-veil  { position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: linear-gradient(180deg, rgba(255,250,247,0.84) 0%, rgba(255,248,245,0.74) 50%, rgba(255,250,247,0.87) 100%); }
    .twinkle { position: fixed; width: 5px; height: 5px; z-index: 0; pointer-events: none; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,250,210,0.9) 0%, rgba(248,160,10,0.35) 60%, transparent 75%);
      animation: twinkleV5 3.2s ease-in-out infinite; }
    @keyframes twinkleV5 { 0%,100% { opacity: 0.12; transform: scale(0.7); } 50% { opacity: 0.5; transform: scale(1.15); } }

    /* ===== Layout principal 20 / 80 ===== */
    .app { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* ----- Checklist (20%) ----- */
    .sidebar {
      width: 20%;
      min-width: 248px;
      max-width: 340px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 18px 16px;
      gap: 14px;
      background: rgba(255,255,255,0.66);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-right: 1.5px solid rgba(248,35,28,0.12);
      box-shadow: 6px 0 28px rgba(120,80,20,0.08);
      overflow-y: auto;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: #f8231c; color: #fff;
      font-size: 14px; font-weight: 700;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(248,35,28,0.32);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      align-self: flex-start;
      font-family: 'Poppins', sans-serif;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(248,35,28,0.42); }

    .ck-head { padding: 2px 4px 0; }
    .ck-eyebrow {
      display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: #f8231c; background: rgba(248,35,28,0.10);
      padding: 4px 12px; border-radius: 999px; text-transform: uppercase;
    }
    .ck-title { font-size: 26px; line-height: 1.05; margin-top: 8px; }
    .ck-title .accent { color: #f8231c; }
    .ck-sub { font-size: 12.5px; color: #6a6a82; margin-top: 4px; line-height: 1.45; }

    .ck-list { display: flex; flex-direction: column; gap: 10px; margin-top: 2px; }
    .ck-item {
      display: flex; align-items: center; gap: 12px;
      width: 100%; text-align: left;
      padding: 12px 14px;
      background: #fff;
      border: 1.5px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      font-family: 'Poppins', sans-serif;
    }
    .ck-item:hover { transform: translateY(-2px); box-shadow: 0 12px 22px rgba(248,35,28,0.14); border-color: rgba(248,35,28,0.30); }
    .ck-emoji {
      flex-shrink: 0;
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: rgba(248,35,28,0.10);
      transition: background 0.18s ease, transform 0.18s ease;
    }
    .ck-item:hover .ck-emoji { background: rgba(248,35,28,0.18); transform: scale(1.06); }
    .ck-label { font-size: 14.5px; font-weight: 700; color: #1a1a2e; line-height: 1.2; }
    .ck-cta { font-size: 11.5px; font-weight: 600; color: #6a6a82; margin-top: 1px; }

    .ck-item.is-active {
      background: #f8231c; border-color: #f8231c;
      box-shadow: 0 12px 26px rgba(248,35,28,0.32);
    }
    .ck-item.is-active .ck-label { color: #fff; }
    .ck-item.is-active .ck-cta { color: rgba(255,255,255,0.85); }
    .ck-item.is-active .ck-emoji { background: rgba(255,255,255,0.22); }

    /* ----- Lector (80%) ----- */
    .reader {
      flex: 1; position: relative; height: 100vh; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      padding: clamp(18px, 3.5vh, 42px) clamp(18px, 3vw, 54px);
    }
    /* Marco tipo tapa de cuento alrededor del libro (lo achica y le da borde de libro) */
    .reader-stage {
      position: relative;
      width: 100%; height: 100%;
      max-width: 840px;
      border-radius: 22px;
      padding: clamp(12px, 2vh, 22px);
      background: linear-gradient(150deg, #fff7ea 0%, #fdeccd 55%, #f6dfb4 100%);
      box-shadow:
        0 28px 56px rgba(120,80,20,0.22),
        8px 10px 0 -3px #f1d8a6,            /* hojas apiladas (derecha/abajo) */
        16px 20px 0 -6px #e8c98f,
        24px 30px 0 -9px #dec083,
        inset 0 0 0 2px rgba(248,180,40,0.38),
        inset 0 0 0 7px rgba(255,255,255,0.7);
      opacity: 0; transition: opacity 0.45s ease;
    }
    .reader-stage.is-ready { opacity: 1; }
    /* Lomo del libro (izquierda) */
    .reader-stage::before {
      content: ''; position: absolute;
      top: 7%; bottom: 7%; left: calc(clamp(12px, 2vh, 22px) - 2px);
      width: 11px; border-radius: 6px; pointer-events: none;
      background: linear-gradient(90deg, rgba(170,115,28,0.30), rgba(170,115,28,0));
    }
    .reader-stage iframe {
      width: 100%; height: 100%;
      border: 0; display: block; background: transparent;
      border-radius: 12px;
    }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 24px;
      transition: opacity 0.35s ease;
    }
    .placeholder.is-hidden { opacity: 0; pointer-events: none; }
    .ph-book { font-size: clamp(56px, 9vh, 96px); animation: phFloat 3.6s ease-in-out infinite; }
    @keyframes phFloat { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-12px) rotate(3deg); } }
    .ph-title { font-family: 'Chewy','Poppins',sans-serif; font-size: clamp(24px, 3.4vw, 38px); color: #1a1a2e; }
    .ph-title .accent { color: #f8231c; }
    .ph-sub { font-size: 15px; color: #6a6a82; max-width: 420px; line-height: 1.5; }

    /* ----- Botón hamburguesa (solo celular) ----- */
    .ck-toggle {
      display: none;
      position: fixed; top: 16px; left: 16px; z-index: 60;
      width: 48px; height: 48px; border: 0; cursor: pointer;
      border-radius: 14px; background: #f8231c; color: #fff;
      box-shadow: 0 8px 20px rgba(248,35,28,0.38);
      align-items: center; justify-content: center;
    }
    .ck-toggle svg { width: 24px; height: 24px; stroke: #fff; stroke-width: 2.4; fill: none; stroke-linecap: round; }
    .scrim { display: none; }

    /* ===== Celular: checklist colapsable (off-canvas) ===== */
    @media (max-width: 768px) {
      .ck-toggle { display: flex; }
      .reader { width: 100%; }
      .sidebar {
        position: fixed; top: 0; left: 0; z-index: 70;
        width: 82%; max-width: 360px; height: 100vh;
        transform: translateX(-104%);
        transition: transform 0.32s cubic-bezier(.2,.8,.2,1);
        background: rgba(255,250,247,0.97);
        padding-top: 74px;
      }
      .sidebar.is-open { transform: translateX(0); }
      .scrim {
        display: block; position: fixed; inset: 0; z-index: 65;
        background: rgba(26,26,46,0.42);
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      }
      .scrim.is-open { opacity: 1; pointer-events: auto; }
      .reader { padding: 14px; }
      .reader-stage { max-width: none; padding: 12px; }
    }
  </style>
</head>
<body>

  <video class="bg-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true"><source src="../../fondo.mp4" type="video/mp4" /></video>
  <div class="bg-veil" aria-hidden="true"></div>

  <button class="ck-toggle" id="ck-toggle" aria-label="Abrir lista de cuentos">
    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
  <div class="scrim" id="scrim"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <a href="../../index.html" class="back-btn" onclick="try{sessionStorage.setItem('alm_return','explorar');}catch(e){}">← Volver a Alimeythor</a>
      <div class="ck-head">
        <span class="ck-eyebrow">Cuentos</span>
        <h1 class="ck-title">Elegí tu <span class="accent">historia</span></h1>
        <p class="ck-sub">Seis cuentos para leer en familia. Tocá uno y se abre acá al lado.</p>
      </div>
      <div class="ck-list" id="ck-list"></div>
    </aside>

    <main class="reader">
      <div class="placeholder" id="placeholder">
        <div class="ph-book">📖</div>
        <div class="ph-title">Elegí un <span class="accent">cuento</span></div>
        <p class="ph-sub">Seleccioná una historia del menú para empezar a leer. El cuento se va a abrir en esta pantalla con todos sus efectos.</p>
      </div>
      <div class="reader-stage" id="reader-stage">
        <iframe id="frame" title="Cuento" allow="autoplay; fullscreen" allowfullscreen></iframe>
      </div>
    </main>
  </div>

  <script>
    const CUENTOS = [
      { file: 'cuento-bano-magico.html',        emoji: '🛁', title: 'El Baño Mágico' },
      { file: 'cuento-sonrisa-magica.html',     emoji: '😊', title: 'La Sonrisa Mágica' },
      { file: 'cuento-respeto-y-amor.html',     emoji: '💗', title: 'Respeto y Amor' },
      { file: 'cuento-oveja-negra.html',        emoji: '🐑', title: 'La Oveja Negra' },
      { file: 'cuento-frasco-brillante.html',   emoji: '✨', title: 'El Frasco Brillante' },
      { file: 'cuento-gran-misterio-bano.html', emoji: '🔍', title: 'El Gran Misterio del Baño' }
    ];

    const listEl  = document.getElementById('ck-list');
    const frame   = document.getElementById('frame');
    const stage   = document.getElementById('reader-stage');
    const phEl     = document.getElementById('placeholder');
    const sidebar = document.getElementById('sidebar');
    const scrim   = document.getElementById('scrim');
    const toggle  = document.getElementById('ck-toggle');
    let activeIdx = -1;

    // ----- Render del checklist -----
    CUENTOS.forEach((c, i) => {
      const b = document.createElement('button');
      b.className = 'ck-item';
      b.innerHTML = '<span class="ck-emoji">' + c.emoji + '</span>' +
                    '<span><span class="ck-label">' + c.title + '</span>' +
                    '<span class="ck-cta" style="display:block;">Leer cuento →</span></span>';
      b.addEventListener('click', () => select(i));
      listEl.appendChild(b);
    });

    function select(i) {
      if (i === activeIdx) { closeSidebar(); return; }
      activeIdx = i;
      Array.from(listEl.children).forEach((el, k) => el.classList.toggle('is-active', k === i));
      // El marco aparece recién cuando el cuento terminó de cargar (mantenemos el cartel mientras tanto)
      stage.classList.remove('is-ready');
      frame.src = CUENTOS[i].file;
      closeSidebar();
    }

    // ----- Al cargar el cuento: quitar su fondo, su cromática y arreglar la música -----
    frame.addEventListener('load', () => {
      if (!frame.src) return;
      try {
        const doc = frame.contentDocument;
        const win = frame.contentWindow;
        if (!doc) return;
        // Fondo transparente para que se vea el bosque suave de Alimeythor
        if (doc.documentElement) doc.documentElement.style.background = 'transparent';
        if (doc.body) doc.body.style.background = 'transparent';
        // Ocultar la cromática propia del cuento (su barra de volver, título y hint)
        ['#back-to-alimeythor-overlay', '.title', '.hint'].forEach(sel => {
          const node = doc.querySelector(sel);
          if (node) node.style.display = 'none';
        });
        patchMusic(win, doc);
      } catch (e) {}
      phEl.classList.add('is-hidden');
      stage.classList.add('is-ready');
    });

    // Una vez que el usuario silencia la música, no vuelve a sonar sola
    // (al pasar de página) hasta que la reactive con el ícono.
    function patchMusic(win, doc) {
      const btn = doc.getElementById('music');
      if (!win || !win.startMusic || !btn) return;
      const origStart = win.startMusic;
      const origStop  = win.stopMusic || function () {};
      let userOff = false;  // true cuando el usuario la apagó a propósito

      // El arranque automático (vuelta de página) respeta el silencio del usuario
      win.startMusic = function () {
        if (userOff) return;
        return origStart.apply(this, arguments);
      };

      // El ícono manda: apagar marca userOff; encender lo limpia y reproduce
      btn.onclick = function () {
        const isOn = !btn.classList.contains('off');
        if (isOn) { userOff = true;  origStop.call(win); }
        else      { userOff = false; origStart.call(win); }
      };
    }

    // ----- Checklist colapsable (celular) -----
    function openSidebar()  { sidebar.classList.add('is-open');  scrim.classList.add('is-open'); }
    function closeSidebar() { sidebar.classList.remove('is-open'); scrim.classList.remove('is-open'); }
    toggle.addEventListener('click', () => {
      sidebar.classList.contains('is-open') ? closeSidebar() : openSidebar();
    });
    scrim.addEventListener('click', closeSidebar);

    // ----- Estrellitas titilando del fondo -----
    (function () {
      const S = [[6,14],[16,64],[9,86],[26,32],[38,78],[60,22],[72,66],[84,12],[90,48],[94,84]];
      S.forEach((p, i) => {
        const t = document.createElement('div');
        t.className = 'twinkle';
        t.style.left = p[0] + 'vw'; t.style.top = p[1] + 'vh';
        t.style.animationDelay = (i * 0.42) + 's';
        t.style.animationDuration = (2.6 + (i % 4) * 0.5) + 's';
        document.body.appendChild(t);
      });
    })();
  </script>
</body>
</html>
